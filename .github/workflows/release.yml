name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - uses: dtolnay/rust-toolchain@stable

    - name: Publish to crates.io
      run: cargo publish --locked
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Sign binary
        if: runner.os == 'macOS'
        run: codesign --sign - target/${{ matrix.target }}/release/pxh

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../pxh-${{ matrix.target }}.tar.gz pxh

      - uses: actions/upload-artifact@v4
        with:
          name: pxh-${{ matrix.target }}
          path: pxh-${{ matrix.target }}.tar.gz

  release:
    name: GitHub Release
    needs: [publish, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum pxh-*.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pxh-*.tar.gz
            SHA256SUMS

  update-homebrew:
    name: Update Homebrew formula
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get source tarball SHA256
        id: sha
        run: |
          url="https://github.com/chipturner/pxhist/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          sha=$(curl -sL "$url" | sha256sum | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update formula and push to tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/chipturner/homebrew-pxh.git" homebrew-tap
          cd homebrew-tap
          mkdir -p Formula
          cat > Formula/pxh.rb << EOF
          class Pxh < Formula
            desc "Fast, cross-shell history mining tool with interactive fuzzy search and sync"
            homepage "https://github.com/chipturner/pxhist"
            url "https://github.com/chipturner/pxhist/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              system bin/"pxh", "--version"
            end
          end
          EOF
          sed -i 's/^          //' Formula/pxh.rb
          git add Formula/pxh.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --cached --quiet || git commit -m "Update pxh to ${VERSION}" && git push
